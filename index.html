<script>

function mark(set,val){[...set.querySelectorAll('.chip')].forEach(c=>c.classList.remove('on'));const t=val===''?'全部':(sigText(val)||val);[...set.querySelectorAll('.chip')].find(c=>c.textContent===t)?.classList.add('on')}

function passC(c){
  if(F.signal&&c.live_signal!==F.signal)return false;
  if(F.elas&&c.elasticity_tier!==F.elas)return false;
  if(F.mcap&&c.mcap_bucket!==F.mcap)return false;

    if(!(c.company.toLowerCase().includes(Q)||c.ticker.toLowerCase().includes(Q)||(c.top_game||'').toLowerCase().includes(Q)||inGame))return false}

}
const COLS=[['company','公司',0],['ticker','代码',0],

function render(){
  const v=$('#board');v.innerHTML='';
  let rows=DATA.companies.filter(passC); rows.sort(cmp);
  const t=el('table'),thead=el('thead'),tr=el('tr');
  COLS.forEach(([k,l,n])=>{const th=el('th',n?'num':'',(sort.k===k?l+(sort.d>0?' ▲':' ▼'):l));th.onclick=()=>{sort.d=sort.k===k?-sort.d:1;sort.k=k;render()};tr.append(th)});

     tdn(c.daily_best_rank!=null?'#'+c.daily_best_rank:'—'),tdn(c.dd_pub_rank!=null?'#'+c.dd_pub_rank:'—'),tdn(c.best_game_rank!=null?'#'+c.best_game_rank:'—'));
    tb.append(r)});

function cmp(a,b){let k=sort.k,va=a[k],vb=b[k];
  if(k==='live_signal'){const o={'🟢候选':0,'🟡观察':1,'⚪不符合':2};va=o[a.live_signal]??3;vb=o[b.live_signal]??3}
  const isRank=k.includes('rank')||k.includes('best');   // 排名类(含best_*列):无数据排到底,不是排最前
  if(va==null)va=isRank?999:-1e9;if(vb==null)vb=isRank?999:-1e9;
  if(typeof va==='string')return sort.d*va.localeCompare(vb,'zh');return sort.d*(va-vb)}
const td=(h,c)=>el('td',c,h),tdm=h=>el('td','',h===''||h==null?'—':h),tdn=(h,c)=>el('td',(c?c+' ':'')+'num',h);

function verdict(c){const re=c.real_elasticity,g=c.top_game||'旗舰',s=c.live_signal;
  if(s.indexOf('候选')>=0)return['v-green',`<b>🟢 候选 — 符合「下一个世纪华通」配置。</b>高弹性(${re}%)、${c.mcap_bucket}市值，《${g}》当前日榜最佳 #${c.daily_best_rank}(${c.daily_n_countries}国)进Top10。财报：${c.confirm_status}。<br>⏳ 兑现靠2-4期财报确认收入放量，股价滞后6-18月，是「早布局+拿得住」长跑道。`];
  if(s.indexOf('观察')>=0){let why=c.mcap_bucket==='大'?`市值已「大」(${c.mcap_usd_m?(c.mcap_usd_m/1000).toFixed(1):'?'}B)，单款难撬动—多半已涨完`:re!=null&&re<8?`弹性${re}%未达高(≥8%)门槛`:`旗舰未稳守Top10`;
    return['v-amber',`<b>🟡 观察 — 暂不进候选。</b>${why}。日榜最佳 ${c.daily_best_rank!=null?'#'+c.daily_best_rank:'无'}。<br>👀 升级触发：旗舰守Top10 + 弹性≥8% + 小/中市值同时成立。`]}
  let why=!c.has_rank&&c.daily_best_rank==null?'当前无榜单覆盖(国内爆款/海外公司待日榜累积)':re!=null&&re<3?`弹性仅${re}%(<3%)，盘子太大`:'未达弹性/排名门槛';
  return['v-gray',`<b>⚪ 不符合弹性猎票配置。</b>${why}。`]}

function hasData(g){return g.monthly_rank.length||Object.keys(g.daily).length||g.revenue.length}
function drill(c){
  destroyAll();const d=$('#drill');
  $('#board-view').hidden=true;$('#detail-view').hidden=false;
  const[vc,vt]=verdict(c);
  const segs=(c.fin_segments||[]).filter(s=>s.val);
  const dataGames=c.games.filter(hasData), noData=c.games.filter(g=>!hasData(g));
  let ghtml=dataGames.map((g,i)=>{
    const ndays=Object.keys(g.daily).length, nmon=g.monthly_rank.length;
    return `<div class="gcard"><div class="gh">${g.name||'—'}${g.name_intl&&g.name_intl!==g.name?` <span class="tag">${g.name_intl}</span>`:''}
      <span class="tag">${g.genre||''} · ${g.status||''}</span>${g.flagship==='Y'?'<span class="star">★旗舰</span>':''}</div>
      <div class="gcharts">
        <div class="chartbox"><h3>游戏畅销日榜·各国(绝对·#1在上，第1天起累积)</h3>${ndays?`<div class="cwrap sm"><canvas id="cd${i}"></canvas></div>`:'<div class="muted2">暂无日榜数据</div>'}</div>
        <div class="chartbox"><h3>出海游戏收入月榜(多口径·#1在上)</h3>${nmon?`<div class="cwrap sm"><canvas id="cm${i}"></canvas></div>`+calStrip('点点·中国出海游戏榜',g.rank_dd,'相对榜')+calStrip('ST·中国出海产品榜',g.rank_st,'出海IAP')+ogRevHtml(g.monthly_rank):'<div class="muted2">暂无月榜数据</div>'}</div>
      </div>
      <div class="subt" style="margin-top:8px">财报披露收入</div>${revHtml(g.revenue)}</div>`;
  }).join('');
  const extra=(c.fin_games_extra||[]).filter(r=>r.val);
  d.innerHTML=`<div class="dh"><h2>${c.company} <span style="color:var(--mut);font-size:14px">${c.ticker} · 市值${fmtMcap(c.mcap_usd_m)} · ${c.n_games}款游戏(${c.n_games_data}有数据)</span></h2>${badge(c.live_signal)}</div>
    <div class="verdict ${vc}">${vt}</div>
    <div class="kv"><div>旗舰 <b>${c.top_game||'—'}</b></div><div>单款年收入 <b>${c.top_game_rev!=null?'$'+c.top_game_rev+'M':'—'}</b></div><div>真实弹性 <b class="tier-${c.elasticity_tier}">${c.real_elasticity!=null?c.real_elasticity+'%':'—'}</b></div><div>市值 <b>${fmtMcap(c.mcap_usd_m)}</b></div><div>TTM利润 <b class="${c.ttm_ni<0?'neg':''}">${c.ttm_ni!=null?fmtMcap(c.ttm_ni):'—'}</b></div><div>TTM PE <b>${c.ttm_pe!=null?c.ttm_pe:'—'}</b></div><div>营收YoY <b>${fmtP(c.rev_yoy)}</b></div><div>净利YoY <b>${fmtP(c.ni_yoy)}</b></div><div>现价 <b>${c.price!=null?(CSYM[c.currency]||'')+c.price:'—'}</b>·3月<b>${fmtP(c.ret_3m)}</b>·6月<b>${fmtP(c.ret_6m)}</b></div></div>
    <div class="sec">公司事实 — 股价 / 财报</div>
    <div class="cfacts">
      <div class="chartbox"><h3>实际股价（${CSYM[c.currency]||c.currency||'原币'}）</h3>${c.price_series.length?'<div class="cwrap"><canvas id="cprice"></canvas></div>':'<div class="muted2">无股价</div>'}</div>
      <div class="chartbox"><h3>营收 / 归母净利 / 净利率（${c.fin.unit||'原币'}）</h3>${hasFin(c)?`<div class="gtoggle">${granBtns(c)}</div><div class="cwrap"><canvas id="cfin"></canvas></div>`:'<div class="muted2">无财报</div>'}</div>
    </div>
    ${segs.length?`<div class="subt">分部 / 业务收入</div><table class="mini"><thead><tr><th>分部</th><th>期间</th><th class="num">金额</th><th>口径</th></tr></thead><tbody>${segs.map(s=>`<tr><td>${s.item}</td><td>${s.period}</td><td class="num">${num(s.val)}</td><td>${(s.metric||'').replace('revenue_','').replace('_',' ')}</td></tr>`).join('')}</tbody></table>`:''}
    ${extra.length?`<div class="subt">其他单款/业务披露</div>${revHtml(extra)}`:''}
    ${((c.pub_rank&&c.pub_rank.length)||(c.stg_rank&&c.stg_rank.length))?`<div class="sec">月度榜单 · 公司级（多口径）</div>${calStrip('点点·中国出海厂商榜',c.pub_rank,'相对榜·中国出海·AS+GP')}${calStrip('ST·全球发行商榜',c.stg_rank,'全球·含国内·AS+GP')}`:''}
    ${(c.news&&c.news.length)?`<div class="sec">新闻 / 定性总结 <span style="font-size:11px;color:var(--mut);font-weight:400">（${c.news.length}条 · 个股新闻+榜单$ · 可点击来源）</span></div>${newsHtml(c.news)}`:''}
    <div class="sec">游戏事实 — ${dataGames.length} 款有数据 / 共 ${c.n_games} 款</div>
    ${ghtml||'<div class="muted2">该公司暂无单款榜单/收入数据</div>'}
    ${noData.length?`<div class="nodata">其余 ${noData.length} 款无榜单/收入数据：${noData.map(g=>g.name).join('、')}</div>`:''}`;
  window.scrollTo(0,0);
  // 实例化图表
  if(c.price_series.length)line('cprice',c.price_series.map(x=>x.m),c.price_series.map(x=>x.p),'#185fa5',false,CSYM[c.currency]||'');
  if(hasFin(c)){
    const def=['annual','interim','quarter'].find(g=>c.fin[g]&&c.fin[g].length);
    renderFin(c,def);
    [...d.querySelectorAll('.gtoggle .gb:not(.dis)')].forEach(b=>b.onclick=()=>{
      d.querySelectorAll('.gtoggle .gb').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderFin(c,b.dataset.g)});
    d.querySelector('.gtoggle .gb[data-g="'+def+'"]')?.classList.add('on');
  }
  dataGames.forEach((g,i)=>{
    if(Object.keys(g.daily).length)dailyChart('cd'+i,g.daily);
    if(g.monthly_rank.length)line('cm'+i,g.monthly_rank.map(x=>x.m),g.monthly_rank.map(x=>x.r),'#d85a30',true);
  });
}
function revHtml(rev){if(!rev||!rev.length)return '<div class="muted2">无单款披露</div>';
  return '<div class="revlist">'+rev.map(r=>`<span class="rv">${r.period} · <b>$${num(r.val)}M</b> <i>${(r.metric||'').replace('revenue_','').replace('_',' ')}</i></span>`).join('')+'</div>'}
function ogRevHtml(mr){const w=(mr||[]).filter(x=>x.rev!=null&&x.rev!=='');if(!w.length)return '';
  return '<div class="revlist" style="margin-top:6px">预估流水 <span class="muted2">(第三方预估·仅AppStore+GooglePlay·偏低)</span>：'+
  w.map(x=>`<span class="rv">${x.m} · <b>≈$${(+x.rev).toFixed(x.rev>=10?0:1)}M</b></span>`).join('')+'</div>'}
function calStrip(label,arr,note){if(!arr||!arr.length)return '';
  return `<div class="revlist" style="margin-top:5px"><b style="color:#1f4e79">${label}</b> <span class="muted2">${note||''}</span> `+
   arr.map(x=>`<span class="rv">${x.m} #${x.r}${(x.rev!=null&&x.rev!=='')?' ≈$'+(+x.rev).toFixed(x.rev>=10?0:1)+'M':''}</span>`).join('')+'</div>'}
function esc(s){return (''+(s==null?'':s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function newsHtml(ns){if(!ns||!ns.length)return '<div class="muted2">无</div>';
  return '<div style="font-size:12px;line-height:1.55;max-height:360px;overflow:auto;padding-right:4px">'+ns.map(n=>{
    const tag=n.k==='榜单'?'<span style="color:#c00000;font-weight:600">[榜单$]</span> ':'';
    return `<div style="padding:5px 0;border-bottom:1px solid var(--bd,#e5e5e5)"><span class="muted2">${esc(n.t)} · ${esc(n.src)}</span> ${tag}${esc(n.title||n.s)} <a href="${esc(n.u)}" target="_blank" rel="noopener" style="color:#185fa5;white-space:nowrap">↗</a></div>`}).join('')+'</div>'}
function line(id,labels,data,color,rev,unit){CH.push(new Chart(document.getElementById(id),{type:'line',
  data:{labels,datasets:[{data,borderColor:color,backgroundColor:color,borderWidth:2,pointRadius:rev?2:0,tension:.25}]},
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:x=>rev?'#'+x.parsed.y:(unit||'')+x.parsed.y}}},
  scales:{x:{ticks:{maxTicksLimit:7,font:{size:9}},grid:{display:false}},
  y:rev?{reverse:true,min:1,suggestedMax:30,ticks:{callback:v=>'#'+v,font:{size:9}}}:{ticks:{callback:v=>(unit||'')+v,font:{size:9}}}}}}))}
function ccColor(cc){if(CC[cc])return CC[cc];let h=0;for(const ch of (cc||''))h=(h*31+ch.charCodeAt(0))%360;return 'hsl('+h+',62%,46%)';}
function dailyChart(id,daily){
  const dates=[...new Set(Object.values(daily).flat().map(x=>x.d))].sort();
  // 按各国最佳(最小)排名排序,只画前N国(防169国图例压扁纵轴);图例放右侧,不占垂直高度
  const TOPN=15;
  const ranked=Object.entries(daily).map(([cc,arr])=>({cc,arr,best:Math.min(...arr.map(x=>x.r))})).sort((a,b)=>a.best-b.best);
  const shown=ranked.slice(0,TOPN), total=ranked.length;
  const ds=shown.map(({cc,arr})=>{const m=Object.fromEntries(arr.map(x=>[x.d,x.r]));
    return{label:(CNAME[cc]||cc.toUpperCase()),data:dates.map(d=>m[d]??null),borderColor:ccColor(cc),backgroundColor:ccColor(cc),borderWidth:1.5,pointRadius:3,spanGaps:true}});
  CH.push(new Chart(document.getElementById(id),{type:'line',data:{labels:dates,datasets:ds},
   options:{responsive:true,maintainAspectRatio:false,plugins:{
     legend:{display:true,position:'right',labels:{boxWidth:8,font:{size:9}}},
     title:{display:total>TOPN,text:'共'+total+'国上榜 · 仅显示排名最高 '+TOPN+' 国',font:{size:10},color:'#999'},
     tooltip:{callbacks:{title:items=>(items[0]&&items[0].dataset.label)||''}}},
   scales:{y:{reverse:true,min:1,suggestedMax:50,ticks:{callback:v=>'#'+v,font:{size:9}}},x:{ticks:{font:{size:9},maxTicksLimit:6},grid:{display:false}}}}}))}
const GRAN=[['annual','年'],['interim','半年'],['quarter','季度']];
function hasFin(c){return c.fin&&(c.fin.annual.length||c.fin.interim.length||c.fin.quarter.length)}
function granBtns(c){return GRAN.map(([g,l])=>{const n=(c.fin[g]||[]).length;return `<span class="gb${n?'':' dis'}" data-g="${g}">${l}${n?'':'<i>·无</i>'}</span>`}).join('')}
function renderFin(c,gran){
  if(FINCH){FINCH.destroy();FINCH=null}
  const rows=c.fin[gran]||[];
  FINCH=new Chart(document.getElementById('cfin'),{data:{labels:rows.map(r=>r.p),datasets:[
    {type:'bar',label:'营收',data:rows.map(r=>r.rev),backgroundColor:'#85b7eb',yAxisID:'y',order:3},
    {type:'bar',label:'归母净利',data:rows.map(r=>r.ni??null),backgroundColor:'#5dcaa5',yAxisID:'y',order:2},
    {type:'line',label:'净利率%',data:rows.map(r=>(r.rev&&r.ni!=null)?Math.round(r.ni/r.rev*1000)/10:null),borderColor:'#d85a30',backgroundColor:'#d85a30',borderWidth:2,pointRadius:2,yAxisID:'y1',order:1}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{boxWidth:8,font:{size:9}}}},
    scales:{x:{ticks:{font:{size:9},maxTicksLimit:14},grid:{display:false}},
     y:{position:'left',ticks:{font:{size:9}}},
     y1:{position:'right',ticks:{callback:v=>v+'%',font:{size:9}},grid:{drawOnChartArea:false}}}}});
}
$('#back').onclick=()=>{$('#detail-view').hidden=true;$('#board-view').hidden=false;destroyAll();window.scrollTo(0,0)};
render();
</script></body></html>
